id: logistics
name: Логистическая автоматизация
version: 0.3.0
kind: specialist
reasoning_mode: executor
audience: employee
handoff_description: Executes exact orchestrator commands for vehicle usage and logistics reports without free-text reasoning.
entrypoint: backend.ai_server.agents.logistics.LogisticsSpecialist
capabilities:
  - logistics
  - vehicle_usage
  - daily_vehicle_report
  - staff_status_tracking
tools:
  - vehicle_usage_context
  - vehicle_usage_reference
  - vehicle_usage_get_operators
  - vehicle_usage_set_operators
  - vehicle_usage_start_day
  - vehicle_usage_get_report
  - vehicle_usage_get_employee_period_report
  - vehicle_usage_get_vehicle_period_report
  - vehicle_usage_save_draft
  - vehicle_usage_save_report
  - vehicle_usage_update_report
  - vehicle_usage_cancel_day
description: Детерминированный контур ежедневного учёта служебных автомобилей без LLM и смысловой маршрутизации.
automations_path: agents/logistics/automations
automations:
  - id: logistics_vehicle_usage
    name: Утренний учёт служебных машин
    kind: business_workflow
    trigger: schedule
    description: По расписанию отправляет запрос, напоминает и сохраняет структурированный отчёт.
    source_project: BitrixAIAgent
    source_modules:
      - app.agent.vehicle_usage
    entrypoint: backend.ai_server.agent_worker
    schedule_hint: daily request and bounded reminders from settings
    status_endpoint: /logistics/vehicle-usage/status
    enabled_by_default: false
    uses_llm: false
    dependencies:
      - bitrix_api
    tools:
      - vehicle_usage_context
      - vehicle_usage_get_operators
      - vehicle_usage_set_operators
      - vehicle_usage_start_day
      - vehicle_usage_get_report
      - vehicle_usage_get_employee_period_report
      - vehicle_usage_get_vehicle_period_report
      - vehicle_usage_save_draft
      - vehicle_usage_save_report
      - vehicle_usage_update_report
      - vehicle_usage_cancel_day
    data_scopes:
      - bitrix24_chats
      - bitrix24_users
      - vehicle_usage
    state_paths:
      - PostgreSQL schema logistics
    emits:
      - vehicle_usage_request_sent
      - vehicle_usage_escalation
data_scopes:
  - bitrix24_chats
  - bitrix24_users
  - vehicle_usage
allowed_actions:
  - read_vehicle_usage
  - write_vehicle_usage
