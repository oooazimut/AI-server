id: bitrix24
name: Специалист Битрикс24
version: 0.1.0
kind: specialist
reasoning_mode: executor
audience: employee
description: Работает с задачами, проектами, CRM, чатами, комментариями, доступом к файлам и локальным индексом портала Битрикс24.
handoff_description: Структурированный исполнитель запросов про задачи, проекты, поиск и доступ к данным портала Битрикс24. Смысл запроса и точные параметры определяет Pro-оркестратор.
entrypoint: backend.ai_server.agents.bitrix24.Bitrix24Specialist
instructions_file: agents/bitrix24/instructions.md
automations_path: agents/bitrix24/automations
capabilities:
  - bitrix24
  - crm_tasks
  - ticket_creation
  - portal_search
  - document_search
  - projects_crm
tools:
  - bitrix_api
  - current_user_profile
  - portal_search
automations:
  - id: bitrix_chat_adapter
    name: Чатовый адаптер Битрикс24
    kind: channel_adapter
    trigger: webhook
    description: Принимает сообщения из чата Битрикс24, передаёт обычные запросы Оркестратору и обслуживает подтверждение/отмену ожидающих Bitrix write actions.
    source_project: BitrixAIAgent
    source_modules:
      - app.agent.dialog_state_store
    entrypoint: backend.ai_server.channels.bitrix.BitrixWebhookProcessor
    status_endpoint: /bitrix/status
    enabled_by_default: true
    human_approval_required: true
    dependencies:
      - bitrix_api
      - internal_orchestrator
    tools:
      - bitrix_api
    data_scopes:
      - bitrix24_chats
      - bitrix24_tasks
      - bitrix24_crm
      - bitrix24_disk
    state_paths:
      - var/dialog_state.sqlite
      - var/bitrix_write_audit.jsonl
    emits:
      - bitrix_chat_message_received
      - bitrix_pending_action_saved
      - bitrix_pending_action_confirmed
      - bitrix_pending_action_cancelled
  - id: bitrix_webhook_event_queue
    name: Очередь вебхуков Битрикс24
    kind: event_worker
    trigger: queue
    description: Принимает события Битрикс24, дедуплицирует их, хранит в SQLite-очереди и обрабатывает с ретраями.
    source_project: BitrixAIAgent
    source_modules:
      - app.agent.webhook_event_queue
      - app.agent.webhook_event_processor
    entrypoint: backend.ai_server.workers.bitrix.webhook_event_queue.WebhookEventQueueWorker
    status_endpoint: /automations/bitrix_webhook_event_queue
    enabled_by_default: true
    dependencies:
      - bitrix_event_webhook
      - bitrix_api
    tools:
      - bitrix_api
      - bitrix_event_parser
    data_scopes:
      - bitrix24_events
      - bitrix24_chats
      - bitrix24_tasks
      - bitrix24_disk
    state_paths:
      - var/webhook_event_queue.sqlite
    emits:
      - queued_webhook_event
      - processed_webhook_event
    notes:
      - Это транспортный worker, а не чатовый агент.
      - Через него проходят только технические события очереди и обновление поискового индекса.
  - id: bitrix_portal_search_indexer
    name: Периодическая индексация портала Битрикс24
    kind: data_pipeline
    trigger: schedule
    description: По расписанию синхронизирует задачи, проекты, диск и содержимое файлов в локальный поисковый индекс.
    source_project: BitrixAIAgent
    source_modules:
      - app.agent.search_indexer
      - app.agent.portal_search
    entrypoint: backend.ai_server.workers.bitrix.search_indexer.PortalSearchIndexerWorker
    schedule_hint: metadata/content/delta intervals from settings
    status_endpoint: /bitrix/search/indexer/status
    enabled_by_default: false
    dependencies:
      - bitrix_api
      - portal_search_index
    tools:
      - bitrix_api
      - portal_search
    data_scopes:
      - bitrix24_tasks
      - bitrix24_projects
      - bitrix24_disk
      - bitrix24_documents
      - portal_search_index
    state_paths:
      - var/search_index.sqlite
      - var/search_content
      - var/search_indexer_state.json
      - var/search_indexer.lock
    emits:
      - portal_index_updated
  - id: bitrix_search_webhook_indexer
    name: Индексация файлов по webhook-событиям
    kind: event_worker
    trigger: webhook
    description: Обновляет или удаляет элементы локального индекса и текст файлов при событиях изменения файлов на диске Битрикс24.
    source_project: BitrixAIAgent
    source_modules:
      - app.agent.search_webhook_indexer
      - app.agent.portal_search
    entrypoint: backend.ai_server.workers.bitrix.search_webhook_indexer.prepare_search_webhook_job
    status_endpoint: /bitrix/search/webhook-indexer/status
    enabled_by_default: false
    dependencies:
      - bitrix_webhook_event_queue
      - portal_search_index
    tools:
      - bitrix_api
      - portal_search
    data_scopes:
      - bitrix24_disk
      - bitrix24_documents
      - portal_search_index
    state_paths:
      - var/search_index.sqlite
      - var/search_content
    emits:
      - portal_index_file_updated
  - id: bitrix_reconciler
    name: Сверка потерянных событий Битрикс24
    kind: scheduled_worker
    trigger: schedule
    description: Периодически сверяет недавно изменённые задачи и дельту диска, чтобы компенсировать потерянные webhook-события.
    source_project: BitrixAIAgent
    source_modules:
      - app.agent.reconciler
    entrypoint: backend.ai_server.workers.bitrix.reconciler.BitrixReconcilerWorker
    schedule_hint: reconcile interval from settings
    status_endpoint: /automations/bitrix_reconciler
    enabled_by_default: true
    dependencies:
      - bitrix_webhook_event_queue
      - bitrix_portal_search_indexer
    tools:
      - bitrix_api
      - portal_search
    data_scopes:
      - bitrix24_tasks
      - bitrix24_disk
      - portal_search_index
    emits:
      - reconciled_task_event
      - reconciled_disk_delta
data_scopes:
  - bitrix24_tasks
  - bitrix24_crm
  - bitrix24_disk
  - portal_search_index
allowed_actions:
  - read_task
  - search_portal_index
  - create_ticket_draft
  - add_internal_comment_draft
approval_required:
  - bitrix_write
  - send_external_message
  - delete_bitrix_entity
  - document_write
