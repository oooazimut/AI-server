schema_version: bitrix.search-intents.v1

verbs:
  search:
    - найди
    - покажи
    - поищи
    - выведи
    - ищи
  list:
    - список
    - перечисли
  next_page:
    - следующая
    - еще
    - ещё
    - дальше
    - продолжить

warehouse:
  warehouse_card:
    meaning: A named warehouse without a narrower requested object.
    include_products: true
    product_limit: 10
  warehouse_contents:
    meaning: Products, stock, contents or availability at a warehouse.
    include_products: true
    product_limit: 10
  product_at_warehouse:
    meaning: A named product at one or more warehouses.
    include_products: true
    use_product_filter: true
    product_limit: 10
  all_warehouses:
    meaning: An explicit request to search across warehouses.
    scope: all_warehouses
    product_limit: 10
  list_warehouses:
    meaning: A request for the warehouse list itself.
    tool: bitrix_warehouse_search
    list_all: true
    include_products: false
  warehouse_info:
    meaning: Address, location or other warehouse information.
    include_products: false
  next_page:
    meaning: Continue the same result branch using its saved pagination state.
  ambiguous:
    meaning: Warehouse, product or source cannot be selected safely.
    action: clarification_required

rules:
  - entity: warehouse
    object_markers: [склад, склады, остатки, наличие]
    default_operation: warehouse_contents
    default_limit: 10
    notes:
      - Search verbs are equivalent; the requested object selects the operation.
      - An address or location request selects warehouse_info without products.
      - An explicit product selects bitrix_warehouse_search with product_query; search_product is not a tool.
  - entity: bitrix_task
    object_markers: [задача, задачи]
    default_operation: my_active_tasks
    default_limit: 10
    notes:
      - Without an explicitly named other person, the scope is the current sender.
      - Only an explicit request for all tasks may select scope=all.
  - entity: portal_document
    object_markers: [файл, документ, папка, диск]
    default_operation: portal_search
    default_limit: 10

ambiguity:
  action: clarification_required
  never_guess_source: true
