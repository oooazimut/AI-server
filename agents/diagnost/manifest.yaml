id: diagnost
name: Техническая диагностика
version: 0.2.0
kind: operator
reasoning_mode: executor
audience: employee
description: Технический сбор трасс, результатов и инцидентов без LLM и без перехвата пользовательских сообщений.
automations:
  - id: diagnost_event_worker
    name: Сборщик диагностических событий
    kind: event_worker
    trigger: queue
    enabled_by_default: true
    uses_llm: false
    description: Сохраняет результаты и снимки трасс, создаёт технические инциденты по строгим признакам.
    entrypoint: backend.ai_server.workers.diagnost.event_worker.run_diagnost_event_worker
    dependencies:
      - redis
      - postgresql
