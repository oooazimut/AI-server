id: internal_orchestrator
name: Внутренний оркестратор
kind: orchestrator
description: Принимает запросы сотрудников, выбирает специалистов, собирает результат и контролирует подтверждения.
entrypoint: backend.ai_server.agents.internal_orchestrator
channels:
  - bitrix24_chat
  - web
capabilities:
  - internal_request_routing
  - task_decomposition
  - approval_coordination
tools: []
data_scopes:
  - employee_identity
  - agent_registry
allowed_actions:
  - delegate_to_specialist
  - request_human_approval
approval_required:
  - external_model_with_sensitive_data
