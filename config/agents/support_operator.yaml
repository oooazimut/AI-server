id: support_operator
name: Оператор техподдержки
kind: operator
description: Общается с клиентами, собирает контакты и описание проблемы, вызывает специалистов и создает заявки.
entrypoint: backend.ai_server.agents.support_operator
channels:
  - max_chat
  - web_support_chat
capabilities:
  - client_intake
  - support_issue_classification
  - ticket_draft_creation
tools:
  - create_ticket_draft
  - send_client_message
data_scopes:
  - client_contact
  - support_dialog
allowed_actions:
  - ask_clarifying_questions
  - create_ticket_draft
  - request_client_check
approval_required:
  - disclose_internal_comment
  - execute_risky_remote_action
